<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>Tic Tac Toe</h1>
    </header>
    <main>
      <dialog id="game-outcome-modal">
        <p id="game-outcome"></p>
        <button id="game-outcome-close" autofocus>Close</button>
      </dialog>
      <dialog id="player-config-modal">
        <form method="dialog" id="player-config-form">
          <label for="new-player-name">Enter Name:</label>
          <input type="text" name="new-player-name" id="new-player-name"/>
          <button type="submit" id="player-config-save">Save</button>
        </form>
      </dialog>
      <div class="score-board">
        <div class="player-card">
          <p id="first-player-name" class="player-name">Player 1</p>
          <p id="first-player-score" class="player-score">0</p>
          <button class="update-name-button" data-player="player1">Update Name</button>
        </div>
        <div class="player-card">
          <p id="second-player-name" class="player-name">Player 2</p>
          <p id="second-player-score" class="player-score">0</p>
          <button class="update-name-button" data-player="player2">Update Name</button>
        </div>
      </div>
      <div id="turn-indicator" class="turn-indicator"></div>
      <div id="game-container" class="game-container"></div>
      <button type="reset" class="restart-button">Restart</button>
      <button id="next-round-button" type="button" class="next-round-button hidden">Play Again</button>
    </main>
    <footer>
      <p>Copyright text</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
